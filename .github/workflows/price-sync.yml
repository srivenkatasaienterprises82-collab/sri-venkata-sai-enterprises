name: Price Sync Automation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: price-sync
  cancel-in-progress: false

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade "curl_cffi>=0.6.0"
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run Flipkart Sync
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          PYTHONPATH: automation
          PYTHONUNBUFFERED: 1
        run: |
          python automation/sync.py --mode flipkart 2>&1 | tee sync.log
      - name: Upload run logs
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: price-sync-logs
          path: |
            sync.log
            updated_products.jsonl
            skipped_products.jsonl
      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Price sync failed. Check GitHub Actions logs."
