name: Price Sync Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run Price Sync
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: python automation/launch_checker.py --mode sync
      - name: Upload price change log
        uses: actions/upload-artifact@v4
        with:
          name: price-changes
          path: price-changes.csv
      - name: Trigger Vercel Redeploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
