name: New Phone Launch Checker

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: launch-check
  cancel-in-progress: false

jobs:
  check-launches:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run Launch Discovery (Flipkart-only)
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: automation
          PYTHONUNBUFFERED: 1
        run: |
          python automation/discover.py --mode launch 2>&1 | tee launch-check.log
      - name: Upload launch-check log
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: launch-check-log
          path: launch-check.log
      - name: Upload new launches log
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: new-launches-jsonl
          path: automation/new_launches.jsonl
