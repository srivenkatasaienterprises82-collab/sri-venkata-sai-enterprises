name: New Phone Launch Checker

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: launch-check
  cancel-in-progress: false

jobs:
  check-launches:
    runs-on: ubuntu-latest
    # The launch scan walks every tracked brand's search page (~11 brands);
    # even with retries it should complete well under 30 minutes.
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run Launch Checker
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        # PYTHONUNBUFFERED=1 so the live log shows the per-brand scan lines
        # in real time. The launch_checker writes structured STATUS=...
        # rows so anyone triaging can see exactly which brand listings were
        # fetched, which new launches were matched, and which were skipped.
        # We tee stdout to a file so the next step can grep for a non-zero
        # added count and decide whether to redeploy.
        run: |
          PYTHONUNBUFFERED=1 python automation/launch_checker.py --mode launch 2>&1 | tee launch-check.log
      - name: Upload launch-check log
        uses: actions/upload-artifact@v4
        # Always keep the scan log for triage, even if the scan errors out.
        if: always()
        continue-on-error: true
        with:
          name: launch-check-log
          path: launch-check.log
      # NOTE: The Vercel Deploy Hook was removed. New draft products are
      # created with `enabled: false`; once an operator publishes one, the
      # `force-dynamic` storefront generates its detail page on demand — no
      # full rebuild required.
